# ============================================================================
# AI tools declaration  (transparency only — not penalized)
# ============================================================================
ai_tools_used:
  - "Cursor"
  - "Claude"

ai_usage_summary: |
  Used Cursor/Claude for code review, refactoring, and debugging during
  development. No candidate data was sent to any hosted LLM at ranking time;
  the only model usage is local/offline embedding pre-computation
  (bge-base-en-v1.5) and a locally-run cross-encoder re-rank (bge-reranker-base).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-stage funnel: hard filters + honeypot anomaly detection; hybrid
  retrieval (dense bge-base-en-v1.5 cosine, precomputed offline, blended 70/30
  with a lexical BM25-Okapi score at rank time); parallel rule-based scoring
  (title/career, trust-weighted skills, experience depth, education, location,
  career-pattern penalties); a 13-signal behavioral composite applied as a
  TRUE multiplier (0.5-1.2x). Base score = ~0.375 semantic + 0.625 rule, then
  scaled by the behavioral multiplier; finally a cross-encoder re-rank of the
  top-200 shortlist (bge-reranker-base) for top-of-funnel precision. Runs
  CPU-only with no network at rank time (reranker weights pre-cached locally).

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
